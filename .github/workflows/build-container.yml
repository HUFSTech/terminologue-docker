name: Build and push container image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Container image tag
        required: true
        default: latest
        type: string

permissions:
  contents: read

concurrency:
  group: container-${{ github.ref }}-${{ inputs.image_tag }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment:
      name: docker
    steps:
      - name: Check required secrets
        shell: bash
        env:
          DOCKERHUB_REGISTRY: ${{ secrets.DOCKERHUB_REGISTRY }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_REPOSITORY: ${{ secrets.DOCKERHUB_REPOSITORY }}
        run: |
          missing=0
          for name in DOCKERHUB_REGISTRY DOCKERHUB_USERNAME DOCKERHUB_TOKEN DOCKERHUB_REPOSITORY; do
            if [ -z "${!name}" ]; then
              echo "::error::Required secret ${name} is not configured"
              missing=1
            fi
          done
          exit "${missing}"

      - name: Validate image tag
        shell: bash
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          if [[ ! "${IMAGE_TAG}" =~ ^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$ ]]; then
            echo "::error::image_tag is not a valid Docker tag"
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@v6

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.DOCKERHUB_REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPOSITORY }}:${{ inputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
